<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1C1C1E">
<title>New Tab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none}
html{background:#1C1C1E;color:#fff}
body{background:#1C1C1E;color:#fff;font-family:-apple-system,'SF Pro Display','SF Pro Text',Helvetica,Arial,sans-serif;min-height:100vh;min-height:-webkit-fill-available;padding:0 20px 120px;overflow-x:hidden;padding-bottom:calc(120px + env(safe-area-inset-bottom,0px))}
.hero{padding-top:48px;padding-bottom:28px;text-align:center}
.greeting{font-size:34px;font-weight:700;letter-spacing:-0.5px;color:#fff}
.date-line{margin-top:6px;font-size:14px;color:#8E8E93}
.search-hint{text-align:center;padding:14px;margin-bottom:24px;border-radius:22px;background:#151515;color:#636366;font-size:15px;cursor:pointer}
.section-label{font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#48484A;margin-bottom:12px;padding-left:2px}
.sites-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 8px;margin-bottom:24px}
.site-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.site-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
.site-name{font-size:11px;color:#8E8E93;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recents-list{display:flex;flex-direction:column;gap:2px}
.recent-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;background:#151515;cursor:pointer}
.recent-favicon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.recent-info{flex:1;min-width:0}
.recent-title{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-url{font-size:11px;color:#8E8E93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.privacy-badge{text-align:center;margin:20px auto 0;padding:8px 16px;border-radius:100px;font-size:11px;color:#48484A}
</style>
</head>
<body>
<div class="hero">
  <div class="greeting" id="greeting">Good Morning</div>
  <div class="date-line" id="dateLine"></div>
</div>
<div class="search-hint" onclick="Android.focusUrlBar()">Search or enter address</div>
<div class="section-label" id="favLabel">Favorites</div>
<div class="sites-grid" id="favGrid"></div>
<div id="recentWrap" style="display:none">
  <div class="section-label">Recently Visited</div>
  <div class="recents-list" id="recentList"></div>
</div>
<div class="privacy-badge">Private browsing</div>
<script>
const PALETTE=['#FF453A','#FF9F0A','#30D158','#0A84FF','#5E5CE6','#BF5AF2','#FF375F','#64D2FF'];
function domainColor(d){let h=0;for(let i=0;i<d.length;i++)h=d.charCodeAt(i)+((h<<5)-h);return PALETTE[Math.abs(h)%PALETTE.length]}
function getDomain(url){try{return new URL(url).hostname.replace(/^www\./,'')}catch{return url}}
function getInitial(title,url){return((title||getDomain(url)||'?')[0]).toUpperCase()}
function navigate(url){try{Android.navigate(url)}catch(e){window.location.href=url}}
const DEFAULTS=[{url:'https://google.com',title:'Google'},{url:'https://youtube.com',title:'YouTube'},{url:'https://reddit.com',title:'Reddit'},{url:'https://x.com',title:'X'},{url:'https://github.com',title:'GitHub'},{url:'https://wikipedia.org',title:'Wikipedia'},{url:'https://amazon.com',title:'Amazon'},{url:'https://netflix.com',title:'Netflix'}];
function buildIcon(site,delay){const dom=getDomain(site.url);const c=domainColor(dom);const el=document.createElement('div');el.className='site-item';el.style.animationDelay=delay+'s';el.innerHTML='<div class="site-icon" style="background:'+c+'"><span>'+getInitial(site.title,site.url)+'</span></div><div class="site-name">'+(site.title.length<18?site.title:dom.charAt(0).toUpperCase()+dom.slice(1))+'</div>';el.addEventListener('click',function(){navigate(site.url)});return el}
function buildRecentRow(item){const dom=getDomain(item.url);const c=domainColor(dom);const el=document.createElement('div');el.className='recent-row';el.innerHTML='<div class="recent-favicon" style="background:'+c+'"><span>'+getInitial(item.title,item.url)+'</span></div><div class="recent-info"><div class="recent-title">'+(item.title||dom)+'</div><div class="recent-url">'+dom+'</div></div>';el.addEventListener('click',function(){navigate(item.url)});return el}
function init(histJson){var g=document.getElementById('favGrid');DEFAULTS.forEach(function(s,i){g.appendChild(buildIcon(s,i*0.04))});try{var h=JSON.parse(histJson||'[]');if(!h.length)return;var seen={},unique=[];for(var i=0;i<h.length;i++){var d=getDomain(h[i].url);if(!seen[d]&&h[i].url&&h[i].url!=='about:blank'){seen[d]=true;unique.push(h[i]);if(unique.length>=8)break}}if(unique.length<2)return;document.getElementById('recentWrap').style.display='block';var l=document.getElementById('recentList');unique.forEach(function(item){l.appendChild(buildRecentRow(item))})}catch(e){}}
(function(){var h=new Date().getHours();document.getElementById('greeting').textContent=h<5?'Good Night':h<12?'Good Morning':h<17?'Good Afternoon':h<21?'Good Evening':'Good Night';document.getElementById('dateLine').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})})();
(function(){try{init(typeof Android!=='undefined'?Android.getRecentHistory():'[]')}catch(e){init('[]')}})();
</script>
</body>
</html>
