<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e8e8;font-family:sans-serif;padding:10px}
#result{margin:0 auto;max-width:100%}
.slide-wrap{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.15);margin-bottom:16px}
.loading{text-align:center;padding:40px;color:#666;font-size:16px}
</style>
<link rel="stylesheet" href="pptxjs.css">
</head>
<body>
<div id="result" class="loading">Loading presentation...</div>
<script src="jquery.min.js"></script>
<script src="jszip.min.js"></script>
<script src="filereader.js"></script>
<script src="dingbat.js"></script>
<script src="pptxjs.js"></script>
<script src="divs2slides.js"></script>
<script>
function renderPptx(base64data) {
  try {
    var binary = atob(base64data);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    var blob = new Blob([bytes], {type: "application/vnd.openxmlformats-officedocument.presentationml.presentation"});
    var url = URL.createObjectURL(blob);
    document.getElementById("result").className = "";
    $("#result").pptxToHtml({
      pptxFileUrl: url,
      slidesScale: "100%",
      slideMode: false,
      mediaProcess: false,
      themeProcess: true
    });
  } catch(e) {
    document.getElementById("result").innerHTML = "Failed to render: " + e.message;
  }
}

function poll() {
  try {
    var data = PptxBridge.getPptxData();
    if (data && data.length > 0) {
      renderPptx(data);
      return;
    }
  } catch(e) {}
  setTimeout(poll, 50);
}
poll();
</script>
</body>
</html>
